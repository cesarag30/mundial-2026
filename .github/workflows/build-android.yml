name: Build Android APK

# Cuándo se dispara este workflow
on:
  # Cada vez que empujas a main → genera APK debug
  # Cuando creas un tag tipo v1.0.0 → genera APK release
  push:
    branches: [main, master]
    tags: ['v*']
  # Manualmente desde la pestaña "Actions" de GitHub
  workflow_dispatch:

jobs:
  build:
    name: Compilar APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1. Descargar el código del repo
      - name: Checkout código
        uses: actions/checkout@v4

      # 2. Instalar Node.js 20
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Instalar Java 17 (necesario para Android Gradle Plugin)
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 4a. Cachear node_modules (acelera builds posteriores ~3 min)
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: node-modules-${{ runner.os }}-

      # 4b. Cachear Gradle (acelera el build de Android)
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # 5. Instalar SDK de Android (no necesita Android Studio)
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 6. Instalar dependencias de Node (rápido si hay cache)
      - name: npm install
        run: |
          if [ -d "node_modules" ]; then
            echo "✓ node_modules viene de cache, solo verifico integridad"
            npm install --legacy-peer-deps --prefer-offline --no-audit
          else
            npm ci --legacy-peer-deps
          fi

      # 7. Compilar la app React
      # - CI=false evita que warnings rompan la build
      # - REACT_APP_FOOTBALL_API_KEY se lee del GitHub Secret y se INCRUSTA
      #   en el bundle JS en tiempo de compilación (así el APK funciona offline
      #   sin necesidad de que el usuario configure nada)
      # - Si el secret no existe, la app cae en "Modo sin conexión" automáticamente
      - name: Build React
        run: |
          set +e
          CI=false npm run build 2>&1 | tee /tmp/build.log
          EXIT=${PIPESTATUS[0]}
          if [ $EXIT -ne 0 ]; then
            echo ""
            echo "::group::❌ ÚLTIMAS 80 LÍNEAS DEL ERROR"
            tail -80 /tmp/build.log
            echo "::endgroup::"
            {
              echo "## ❌ Build React falló"
              echo ""
              echo "### Últimas 80 líneas:"
              echo '```'
              tail -80 /tmp/build.log
              echo '```'
            } >> $GITHUB_STEP_SUMMARY
          fi
          # Mensaje informativo sobre la API
          if [ -n "$REACT_APP_FOOTBALL_API_KEY" ]; then
            echo "✓ APK construida con API key (auto-actualización activa)"
          else
            echo "ℹ️ APK sin API key — la app usará datos estáticos. Configura el secret FOOTBALL_API_KEY para activar la API en vivo."
          fi
          exit $EXIT
        env:
          GENERATE_SOURCEMAP: false
          REACT_APP_FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          REACT_APP_RESULTS_JSON_URL: ${{ secrets.RESULTS_JSON_URL }}

      # 7b. Subir el log siempre, para poder revisarlo aunque falle
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-react-log
          path: /tmp/build.log
          retention-days: 7

      # 8. Añadir plataforma Android (si no existe)
      - name: Capacitor add Android
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      # 9. Sincronizar assets web → proyecto Android nativo
      - name: Capacitor sync
        run: npx cap sync android

      # 10. Generar el APK con Gradle
      - name: Build APK (debug)
        if: "!startsWith(github.ref, 'refs/tags/')"
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Build APK (release)
        if: "startsWith(github.ref, 'refs/tags/')"
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      # 11. Subir el APK como artefacto descargable
      - name: Upload APK debug
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: mundial-2026-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload APK release
        if: "startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: mundial-2026-release-apk
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 90

      # 12. (Solo en tags) Crear release en GitHub
      - name: Crear Release
        if: "startsWith(github.ref, 'refs/tags/')"
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/app-release-unsigned.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
